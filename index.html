<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Grade Calculator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 40px 20px; }
        .container { max-width: 600px; margin: auto; background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        .skill-row { margin-bottom: 1.5rem; }
        .skill-label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; text-transform: uppercase; color: #64748b; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .score-btn {
            flex: 1;
            min-width: 50px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .score-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .score-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
        }

        .result-panel {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f1f5f9;
            border-radius: 8px;
            text-align: center;
        }
        .grade-label { font-size: 0.9rem; color: #64748b; margin-bottom: 5px; }
        #grade-output { font-size: 3rem; font-weight: 800; color: var(--primary); display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Skill Assessment</h2>
    
    <div id="calculator-ui">
        </div>

    <div class="result-panel">
        <div class="grade-label">OVERALL GRADE</div>
        <span id="grade-output">C</span>
    </div>
</div>

<script>
    const categories = ["Skill Category 1", "Skill Category 2", "Skill Category 3"];
    // Defaulting all to 2 as per instructions
    const currentScores = [2, 2, 2]; 
    const options = ["NE", 1, 2, 3, 4];

    function render() {
        const container = document.getElementById('calculator-ui');
        container.innerHTML = '';

        categories.forEach((cat, rowIndex) => {
            const row = document.createElement('div');
            row.className = 'skill-row';

            const label = document.createElement('span');
            label.className = 'skill-label';
            label.innerText = cat;
            row.appendChild(label);

            const group = document.createElement('div');
            group.className = 'btn-group';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `score-btn ${currentScores[rowIndex] === opt ? 'active' : ''}`;
                btn.innerText = opt;
                btn.onclick = () => updateScore(rowIndex, opt);
                group.appendChild(btn);
            });

            row.appendChild(group);
            container.appendChild(row);
        });
        calculateGrade();
    }

    function updateScore(index, value) {
        currentScores[index] = value;
        render(); // Re-render to update visual "active" state
    }

    function calculateGrade() {
        const s = currentScores;
        const count = (val) => s.filter(x => x === val).length;
        
        // Filter out "NE" for numerical comparisons
        const nums = s.filter(x => typeof x === 'number');
        const minNum = Math.min(...nums);
        const maxNum = Math.max(...nums);
        const hasNE = s.includes("NE");

        let grade = "F"; // Default fallback

        // Implementation of your specific grading logic
        if (hasNE || count(1) >= 2) {
            grade = "F";
        } else if (count(1) === 1 && count(2) === 2) {
            grade = "D";
        } else if (count(1) === 1 && maxNum >= 3) {
            grade = "CD";
        } else if (s.every(x => x === 2)) {
            grade = "C";
        } else if (count(2) >= 2 && maxNum >= 3) {
            grade = "BC";
        } else if (count(2) === 1 && minNum === 2 && s.every(x => x >= 2)) {
            grade = "B";
        } else if (s.every(x => x === 3)) {
            grade = "AB";
        } else if (maxNum >= 4 && minNum >= 3) {
            grade = "A";
        }

        document.getElementById('grade-output').innerText = grade;
    }

    // Initial Load
    render();
</script>

</body>
</html>
